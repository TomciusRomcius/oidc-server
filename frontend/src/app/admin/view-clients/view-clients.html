<app-page>
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-xl">Clients</h1>
    <button mat-button [routerLink]="['create']">Create client</button>
  </div>

  <table mat-table [dataSource]="clients()">
    <ng-container matColumnDef="clientId">
      <th mat-header-cell *matHeaderCellDef>Client ID</th>
      <td mat-cell *matCellDef="let client">{{ client.clientId }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let client">
        <button mat-button [routerLink]="['edit', client.clientId]">Edit</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</app-page>
