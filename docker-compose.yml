services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/OidcServer/Src:/app/OidcServer/Src
      - ./Properties:/app/Properties
    ports:
      - 8080:8080
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
    ports:
      - 4200:4200